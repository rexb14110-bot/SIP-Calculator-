<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>SIP Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #f5f7fc;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.2rem;
    }

    /* CARD – pure white */
    .sip-card {
      max-width: 580px;
      width: 100%;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 12px 28px -8px rgba(0, 20, 40, 0.08);
      padding: 2rem 1.8rem 1.8rem;
      border: 1px solid rgba(220, 230, 245, 0.3);
    }

    .card-header h1 {
      font-size: 1.9rem;
      font-weight: 600;
      color: #0b2a44;
      letter-spacing: -0.3px;
      margin-bottom: 0.1rem;
    }

    /* toggle (flat) */
    .toggle-group {
      display: flex;
      gap: 0.5rem;
      margin: 1.4rem 0 1.8rem;
      background: #f0f4fe;
      padding: 0.3rem;
      border-radius: 40px;
    }
    .toggle-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0.65rem 0;
      font-weight: 500;
      font-size: 0.95rem;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      background: transparent;
      color: #2a4e72;
      transition: 0.15s;
    }
    .toggle-btn.active {
      background: #ffffff;
      color: #0b2a44;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      font-weight: 600;
      border: 1px solid #dbe3f0;
    }
    .toggle-btn:active { opacity: 0.7; }

    /* inputs */
    .input-row {
      margin-bottom: 1.2rem;
    }
    .label-group {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.3rem;
    }
    .label-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #1f4466;
      letter-spacing: -0.2px;
    }

    .input-field {
      width: 100%;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      border: 1px solid #d9e2f0;
      border-radius: 30px;
      background: #fafcff;
      transition: 0.15s;
      font-weight: 500;
      outline: none;
      color: #05243b;
    }
    .input-field:focus {
      border-color: #2b6c9e;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(43, 108, 158, 0.06);
    }

    .amount-words {
      font-size: 0.7rem;
      margin-top: 0.3rem;
      color: #146b4a;
      background: #e2edfc;
      display: inline-block;
      padding: 0.15rem 0.8rem;
      border-radius: 30px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .error-hint, .max-hint {
      font-size: 0.65rem;
      margin-top: 0.2rem;
      display: inline-block;
    }
    .error-hint { color: #b13b2b; }
    .max-hint { color: #8a5d2f; }

    /* inflation button - flat */
    .inflation-button {
      background: transparent;
      border: 1px solid #d0ddec;
      width: 100%;
      padding: 0.7rem 0.8rem;
      margin: 0.5rem 0 0.9rem;
      border-radius: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #1c4d74;
      transition: 0.15s;
      background: #f9fcff;
    }
    .inflation-button.active {
      background: #e3edfc;
      border-color: #2b6c9e;
      color: #0b2a44;
    }
    .inflation-button:active { opacity: 0.6; }

    /* calculate button */
    .calc-button {
      background: #1a4e7a;
      border: none;
      width: 100%;
      padding: 0.85rem 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      border-radius: 40px;
      cursor: pointer;
      margin: 0.1rem 0 1rem;
      transition: 0.15s;
      letter-spacing: 0.3px;
      border: 1px solid #1a4e7a;
    }
    .calc-button:active { 
      transform: scale(0.97);
      background: #124067;
    }

    /* results */
    .results-panel {
      border-radius: 20px;
      margin-top: 0.2rem;
    }
    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1rem;
      background: #f6faff;
      margin-bottom: 0.4rem;
      border-radius: 30px;
      border: 1px solid #eef3fc;
    }
    .result-label {
      font-weight: 500;
      color: #1f4c70;
      font-size: 0.9rem;
    }
    .result-value {
      font-weight: 700;
      font-size: 1rem;
      color: #022e4a;
    }
    .profit-value { color: #146b4a; }
    .extra-row { display: none; }

    /* ========= INTRO ANIMATION (LINES WALA) ========= */
    .intro-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #0a1a2f;
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 1.2s ease, visibility 0s linear 1.2s;
      overflow: hidden;
    }

    .intro-container.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .intro-container .line {
      position: absolute;
      width: 4px;
      height: 200px;
      background: #00a6ff;
      bottom: -220px;
      box-shadow: 0 0 20px #00a6ff, 0 0 8px #0088cc;
      animation: moveUpFresh 3.2s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
    }
    .intro-container .line:nth-child(1) { left: 15%; animation-delay: 0s; width: 5px; }
    .intro-container .line:nth-child(2) { left: 35%; animation-delay: 0.25s; width: 3px; height: 160px; }
    .intro-container .line:nth-child(3) { left: 55%; animation-delay: 0.5s; width: 4px; }
    .intro-container .line:nth-child(4) { left: 75%; animation-delay: 0.75s; width: 5px; height: 220px; }
    .intro-container .line:nth-child(5) { left: 90%; animation-delay: 1s; width: 3px; height: 140px; }

    @keyframes moveUpFresh {
      0% { transform: translateY(0); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-130vh); opacity: 0; }
    }

    .intro-container .title {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-align: center;
      opacity: 0;
      animation: showTitleFresh 0.9s ease forwards 2.2s;
      white-space: nowrap;
      text-shadow: 0 0 15px #0088ff;
    }
    .intro-container .title span {
      color: #3ea5ff;
      text-shadow: 0 0 20px #3ea5ff;
    }

    @keyframes showTitleFresh {
      0% { opacity: 0; transform: translateX(-50%) scale(0.7); }
      100% { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    .intro-container .chart {
      position: absolute;
      bottom: 12%;
      width: 85%;
      max-width: 550px;
      height: 280px;
      display: flex;
      justify-content: space-evenly;
      align-items: flex-end;
      opacity: 0;
      animation: showChartFresh 0.6s forwards 3.6s;
    }
    @keyframes showChartFresh { to { opacity: 1; } }
    .intro-container .bar {
      width: 55px;
      background: linear-gradient(to top, #2b8cff, #0055cc);
      border-radius: 14px 14px 0 0;
      transform: scaleY(0);
      transform-origin: bottom;
      box-shadow: 0 0 18px rgba(0, 136, 255, 0.7);
    }
    .intro-container .bar1 { height: 90px; animation: growBar 0.9s forwards 4s; }
    .intro-container .bar2 { height: 150px; animation: growBar 0.9s forwards 4.3s; }
    .intro-container .bar3 { height: 230px; animation: growBar 0.9s forwards 4.6s; }
    .intro-container .bar4 { height: 180px; animation: growBar 0.9s forwards 4.9s; }
    .intro-container .bar5 { height: 110px; animation: growBar 0.9s forwards 5.2s; }
    @keyframes growBar { to { transform: scaleY(1); } }

    .intro-container .particle {
      position: absolute;
      background: #3ea5ff;
      border-radius: 50%;
      opacity: 0;
      animation: floatParticle 2s ease-in-out forwards;
    }
    @keyframes floatParticle {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      20% { opacity: 0.7; }
      100% { opacity: 0; transform: translateY(-150px) scale(1.2); }
    }

    .calculator-container {
      display: none;
      width: 100%;
      justify-content: center;
      animation: fadeCalc 0.5s ease;
    }
    .calculator-container.visible { display: flex; }
    @keyframes fadeCalc { from { opacity:0; } to { opacity:1; } }

    @media (max-width: 500px) {
      .sip-card { padding: 1.4rem; }
      .intro-container .title { font-size: 2rem; top: 10%; white-space: nowrap; }
      .result-value { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<!-- INTRO ANIMATION (LINES WALA) -->
<div class="intro-container" id="introContainer">
  <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
  <h2 class="title"><span>SIP</span> Calculator</h2>
  <div class="chart">
    <div class="bar bar1"></div>
    <div class="bar bar2"></div>
    <div class="bar bar3"></div>
    <div class="bar bar4"></div>
    <div class="bar bar5"></div>
  </div>
</div>

<!-- CALCULATOR -->
<div class="calculator-container" id="calculatorContainer">
  <div class="sip-card">
    <div class="card-header"><h1>SIP Calculator</h1></div>

    <div class="toggle-group" id="modeToggle">
      <button class="toggle-btn active" data-mode="sip"><span>📅</span> SIP</button>
      <button class="toggle-btn" data-mode="lumpsum"><span>⚡</span> One-Time</button>
    </div>

    <!-- Amount -->
    <div class="input-row">
      <div class="label-group"><label id="amountLabel">Monthly SIP Amount</label></div>
      <input type="number" id="investmentAmount" class="input-field" placeholder="Enter amount" step="100" value="3000">
      <div id="amountError" class="error-hint"></div>
      <div id="amountWords" class="amount-words"></div>
    </div>

    <!-- Return -->
    <div class="input-row">
      <div class="label-group"><label>Expected Gain % (per year)</label></div>
      <input type="number" id="returnRate" class="input-field" placeholder="Annual return %" step="0.5" value="12">
      <div id="returnError" class="error-hint"></div>
    </div>

    <!-- Tenure -->
    <div class="input-row">
      <div class="label-group"><label>SIP Tenure (Years)</label></div>
      <input type="number" id="tenureYears" class="input-field" placeholder="Years" step="0.5" value="5">
      <div class="max-hint" id="tenureMaxHint">⏱ Maximum 50 years</div>
    </div>

    <!-- Inflation button -->
    <button id="inflationToggleBtn" class="inflation-button">
      <span>📉</span> Adjust for inflation (6% assumed) <strong id="inflationStatus">OFF</strong>
    </button>

    <button class="calc-button" id="calculateBtn">✨ Calculate ✨</button>

    <!-- Results -->
    <div class="results-panel">
      <div class="result-item">
        <span class="result-label">📌 Invested</span>
        <span class="result-value" id="investedAmount">₹ 0</span>
      </div>
      <div class="result-item">
        <span class="result-label">🏦 Total</span>
        <span class="result-value" id="totalValue">₹ 0</span>
      </div>
      <div class="result-item">
        <span class="result-label">✨ Profit</span>
        <span class="result-value profit-value" id="profitAmount">₹ 0</span>
      </div>
      <div id="inflationRow" class="result-item extra-row">
        <span class="result-label">🛡️ Real Value (today's ₹)</span>
        <span class="result-value" id="realValue">₹ 0</span>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    // INTRO → calculator
    const introDiv = document.getElementById('introContainer');
    const calculatorDiv = document.getElementById('calculatorContainer');

    // Particles
    for(let i=0; i<28; i++) {
      let particle = document.createElement('div');
      particle.classList.add('particle');
      let size = Math.random() * 6 + 2;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.bottom = Math.random() * 80 + '%';
      particle.style.animationDelay = (Math.random() * 2.5) + 's';
      particle.style.animationDuration = (Math.random() * 2 + 1.2) + 's';
      introDiv.appendChild(particle);
    }

    setTimeout(() => {
      if(introDiv) {
        introDiv.classList.add('fade-out');
        setTimeout(() => {
          introDiv.style.display = 'none';
          calculatorDiv.classList.add('visible');
        }, 1200);
      } else {
        calculatorDiv.classList.add('visible');
      }
    }, 6800);

    // DOM refs
    const modeBtns = document.querySelectorAll('#modeToggle .toggle-btn');
    const amountInput = document.getElementById('investmentAmount');
    const returnInput = document.getElementById('returnRate');
    const tenureInput = document.getElementById('tenureYears');
    const calcBtn = document.getElementById('calculateBtn');
    const inflationBtn = document.getElementById('inflationToggleBtn');
    const inflationStatusSpan = document.getElementById('inflationStatus');
    const investedSpan = document.getElementById('investedAmount');
    const totalSpan = document.getElementById('totalValue');
    const profitSpan = document.getElementById('profitAmount');
    const inflationRow = document.getElementById('inflationRow');
    const realValueSpan = document.getElementById('realValue');
    const amountLabel = document.getElementById('amountLabel');
    const amountErrorSpan = document.getElementById('amountError');
    const returnErrorSpan = document.getElementById('returnError');
    const tenureMaxHint = document.getElementById('tenureMaxHint');
    const amountWordsSpan = document.getElementById('amountWords');

    const MIN_AMOUNT = 100;
    const MAX_RETURN = 40;
    const MAX_TENURE = 50;
    const INFLATION_RATE = 6;

    let currentMode = 'sip';
    let inflationActive = false;

    function formatIndianWords(num) {
      if (isNaN(num) || num === null || num === '') return '';
      let n = parseFloat(num);
      if (isNaN(n) || n === 0) return '';
      if (n < 0) return 'negative';
      if (n >= 10000000) {
        let crore = (n / 10000000).toFixed(2).replace(/\.00$/, '');
        return `${crore} Cr`;
      }
      if (n >= 100000) {
        let lakh = (n / 100000).toFixed(2).replace(/\.00$/, '');
        return `${lakh} Lakh`;
      }
      if (n >= 1000) {
        let thousand = (n / 1000).toFixed(2).replace(/\.00$/, '');
        return `${thousand} Thousand`;
      }
      return `${Math.round(n)}`;
    }

    function formatResultWords(value) {
      if (isNaN(value) || value === 0) return '₹ 0';
      if (value < 0) return `- ₹ ${formatIndianWords(Math.abs(value))}`;
      return `₹ ${formatIndianWords(value)}`;
    }

    function updateAmountWords() {
      let val = parseFloat(amountInput.value);
      if (!isNaN(val) && val > 0) {
        amountWordsSpan.innerText = formatIndianWords(val);
      } else {
        amountWordsSpan.innerText = '';
      }
    }

    function enforceMinAmount() {
      let val = parseFloat(amountInput.value);
      if (isNaN(val) || val < MIN_AMOUNT) {
        amountInput.value = MIN_AMOUNT;
        amountErrorSpan.innerText = `⚠️ Min ₹${MIN_AMOUNT}`;
        setTimeout(() => amountErrorSpan.innerText = '', 1600);
        return MIN_AMOUNT;
      }
      return val;
    }

    function enforceMaxReturn() {
      let val = parseFloat(returnInput.value);
      if (isNaN(val)) return 0;
      if (val > MAX_RETURN) {
        returnInput.value = MAX_RETURN;
        returnErrorSpan.innerText = `⚠️ Max ${MAX_RETURN}%`;
        setTimeout(() => returnErrorSpan.innerText = '', 1600);
        return MAX_RETURN;
      }
      if (val < 0) {
        returnInput.value = 0;
        returnErrorSpan.innerText = `⚠️ Positive only`;
        setTimeout(() => returnErrorSpan.innerText = '', 1500);
        return 0;
      }
      return val;
    }

    function computeValues(mode, amount, annualRatePercent, years) {
      if (amount <= 0 || years <= 0) {
        if (mode === 'sip') {
          let months = Math.max(0, Math.round(years * 12));
          return { invested: amount * months, maturity: 0 };
        } else {
          return { invested: amount, maturity: 0 };
        }
      }
      if (mode === 'sip') {
        const months = Math.round(years * 12);
        if (months === 0) return { invested: 0, maturity: 0 };
        const monthlyRate = annualRatePercent / 100 / 12;
        const invested = amount * months;
        let maturity = 0;
        if (monthlyRate === 0) maturity = invested;
        else {
          const factor = Math.pow(1 + monthlyRate, months);
          maturity = amount * ((factor - 1) / monthlyRate) * (1 + monthlyRate);
        }
        return { invested, maturity };
      } else {
        const rateDecimal = annualRatePercent / 100;
        const maturity = amount * Math.pow(1 + rateDecimal, years);
        return { invested: amount, maturity };
      }
    }

    function computeRealValue(mode, amount, nominalPercent, years) {
      if (amount <= 0 || years <= 0) return 0;
      const realRatePercent = ((1 + nominalPercent / 100) / (1 + INFLATION_RATE / 100) - 1) * 100;
      if (realRatePercent <= -100) return 0;
      if (mode === 'sip') {
        const months = Math.round(years * 12);
        if (months === 0) return 0;
        const monthlyReal = realRatePercent / 100 / 12;
        if (monthlyReal === 0) return amount * months;
        const factor = Math.pow(1 + monthlyReal, months);
        const realMaturity = amount * ((factor - 1) / monthlyReal) * (1 + monthlyReal);
        return realMaturity > 0 ? realMaturity : 0;
      } else {
        const realDecimal = realRatePercent / 100;
        const realVal = amount * Math.pow(1 + realDecimal, years);
        return realVal > 0 ? realVal : 0;
      }
    }

    function performCalculation() {
      let amount = enforceMinAmount();
      let annualReturn = enforceMaxReturn();
      let years = parseFloat(tenureInput.value);
      if (isNaN(years)) years = 0;
      if (years > MAX_TENURE) {
        tenureInput.value = MAX_TENURE;
        years = MAX_TENURE;
        tenureMaxHint.style.color = "#b13b2b";
        tenureMaxHint.innerText = "⚠️ Max 50 years applied";
        setTimeout(() => {
          tenureMaxHint.style.color = "#8a5d2f";
          tenureMaxHint.innerText = "⏱ Maximum 50 years";
        }, 2000);
      }
      if (years < 0) years = 0;

      const { invested, maturity } = computeValues(currentMode, amount, annualReturn, years);
      const profit = maturity - invested;

      investedSpan.innerText = formatResultWords(invested);
      totalSpan.innerText = formatResultWords(maturity);
      profitSpan.innerText = formatResultWords(profit);
      updateAmountWords();

      if (inflationActive && years > 0 && amount > 0 && maturity > 0) {
        let real = computeRealValue(currentMode, amount, annualReturn, years);
        if (real < 0) real = 0;
        realValueSpan.innerText = formatResultWords(real);
        inflationRow.style.display = 'flex';
      } else {
        inflationRow.style.display = 'none';
      }
    }

    function toggleInflation() {
      inflationActive = !inflationActive;
      if (inflationActive) {
        inflationBtn.classList.add('active');
        inflationStatusSpan.innerText = 'ON';
      } else {
        inflationBtn.classList.remove('active');
        inflationStatusSpan.innerText = 'OFF';
        inflationRow.style.display = 'none';
      }
      performCalculation();
    }

    function updateModeUI() {
      if (currentMode === 'sip') {
        amountLabel.innerText = 'Monthly SIP Amount';
        amountInput.placeholder = "e.g., 2000";
        amountInput.step = "100";
      } else {
        amountLabel.innerText = 'One-Time Investment';
        amountInput.placeholder = "e.g., 50000";
        amountInput.step = "500";
      }
      enforceMinAmount();
      updateAmountWords();
    }

    function setActiveMode(mode) {
      currentMode = mode;
      modeBtns.forEach(btn => {
        if (btn.getAttribute('data-mode') === mode) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      updateModeUI();
      performCalculation();
    }

    function onAmountInput() {
      let val = parseFloat(amountInput.value);
      if (!isNaN(val) && val < MIN_AMOUNT && val !== 0) {
        amountErrorSpan.innerText = `⚠️ Min ₹${MIN_AMOUNT}`;
      } else {
        amountErrorSpan.innerText = '';
      }
      updateAmountWords();
    }
    function onAmountBlur() { enforceMinAmount(); updateAmountWords(); performCalculation(); }
    function onReturnInput() {
      let val = parseFloat(returnInput.value);
      if (!isNaN(val) && val > MAX_RETURN) returnErrorSpan.innerText = `⚠️ Max ${MAX_RETURN}%`;
      else if (!isNaN(val) && val < 0) returnErrorSpan.innerText = `⚠️ Positive only`;
      else returnErrorSpan.innerText = '';
    }
    function onReturnBlur() { enforceMaxReturn(); performCalculation(); }
    function onTenureInput() {
      let val = parseFloat(tenureInput.value);
      if (!isNaN(val) && val > MAX_TENURE) {
        tenureInput.value = MAX_TENURE;
        tenureMaxHint.style.color = "#b13b2b";
        tenureMaxHint.innerText = `⚠️ Max ${MAX_TENURE} years`;
        setTimeout(() => {
          tenureMaxHint.style.color = "#8a5d2f";
          tenureMaxHint.innerText = "⏱ Maximum 50 years";
        }, 2000);
      } else if (!isNaN(val) && val < 0) tenureInput.value = 0;
      performCalculation();
    }

    function bindEvents() {
      modeBtns.forEach(btn => btn.addEventListener('click', () => setActiveMode(btn.getAttribute('data-mode'))));
      calcBtn.addEventListener('click', performCalculation);
      inflationBtn.addEventListener('click', toggleInflation);
      amountInput.addEventListener('input', onAmountInput);
      amountInput.addEventListener('blur', onAmountBlur);
      returnInput.addEventListener('input', onReturnInput);
      returnInput.addEventListener('blur', onReturnBlur);
      tenureInput.addEventListener('input', onTenureInput);
      tenureInput.addEventListener('change', onTenureInput);
    }

    function init() {
      bindEvents();
      setActiveMode('sip');
      amountInput.value = "3000";
      returnInput.value = "12";
      tenureInput.value = "5";
      inflationActive = false;
      inflationBtn.classList.remove('active');
      inflationStatusSpan.innerText = 'OFF';
      inflationRow.style.display = 'none';
      enforceMinAmount();
      enforceMaxReturn();
      updateAmountWords();
      performCalculation();
    }
    init();
  })();
</script>
</body>
